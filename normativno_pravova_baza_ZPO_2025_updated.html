let tab="all",q="";

function renderStats(){
  const el=document.getElementById("sR");
  const c={law:0,decree:0,order:0,regulation:0,concept:0,standard:0};
  docs.forEach(d=>{if(c[d.cat]!==undefined)c[d.cat]++;});
  el.innerHTML=`
    <div class="sc"><div class="sc-n">${docs.length}</div><div class="sc-l">Усього документів</div></div>
    <div class="sc"><div class="sc-n">${c.law}</div><div class="sc-l">Законів</div></div>
    <div class="sc"><div class="sc-n">${c.decree}</div><div class="sc-l">Постанов КМУ</div></div>
    <div class="sc"><div class="sc-n">${c.order+c.regulation}</div><div class="sc-l">Наказів та положень</div></div>
    <div class="sc"><div class="sc-n">${c.concept+c.standard}</div><div class="sc-l">Концепцій та стандартів</div></div>
  `;
}

function renderTabs(){
  document.getElementById("tC").innerHTML=cats.map(c=>`
    <button class="tb${tab===c.id?' active':''}" onclick="setTab('${c.id}')">
      <i class="ti ${c.icon}" aria-hidden="true"></i>${c.label}
    </button>`).join("");
}

function setTab(id){tab=id;renderTabs();renderDocs();}
function flt(){q=document.getElementById("si").value.toLowerCase();renderDocs();}

function toggle(id){
  document.getElementById("c"+id).classList.toggle("open");
}

function openLink(url,e){
  e.stopPropagation();
  window.open(url,"_blank");
}

function renderDocs(){
  const el=document.getElementById("dL");
  const f=docs.filter(d=>{
    const mc=tab==="all"||d.cat===tab;
    const mq=!q||d.name.toLowerCase().includes(q)||d.desc.toLowerCase().includes(q);
    return mc&&mq;
  });
  if(!f.length){
    el.innerHTML='<div class="empty"><i class="ti ti-search-off" style="font-size:22px;display:block;margin-bottom:8px"></i>Документів не знайдено</div>';
    return;
  }
  el.innerHTML=f.map(d=>`
    <div class="card${d.isNew?' new-law':''}" id="c${d.id}" onclick="toggle(${d.id})">
      <div class="ch">
        <div class="ci ${d.ci}"><i class="ti ti-file-text" aria-hidden="true"></i></div>
        <div class="cm">
          <div class="cn">${d.name}</div>
          <div class="badges">
            <span class="b ${d.bc}">${d.badge}</span>
            <span class="b b-year">${d.year}</span>
            ${d.isNew?'<span class="b b-new">Новий</span>':''}
          </div>
        </div>
        <i class="ti ti-chevron-down chevron" aria-hidden="true"></i>
      </div>
      <div class="body">
        <p class="desc">${d.desc}</p>
        <div class="arts">
          <div class="arts-t"><i class="ti ti-list" style="font-size:12px;vertical-align:-1px;margin-right:4px"></i>Ключові положення</div>
          <ul>${d.arts.map(a=>`<li>${a}</li>`).join("")}</ul>
        </div>
        <div class="btn-row">
          <a class="doc-btn primary" href="${d.link}" target="_blank" onclick="event.stopPropagation()">
            <i class="ti ti-external-link" aria-hidden="true"></i>Відкрити документ
          </a>
